<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nova Domus — Comercial</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f5f5f5; --bg3: #ebebeb;
  --text: #1a1a1a; --text2: #666; --text3: #999;
  --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.2);
  --navy: #0d1b3e; --navy2: #1a2744;
  --radius: 12px; --radius-sm: 8px;
}
@media (prefers-color-scheme: dark) {
  :root { --bg: #1a1a1a; --bg2: #242424; --bg3: #2e2e2e; --text: #f0f0f0; --text2: #aaa; --text3: #666; --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2); }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 0; }

#app { width: 100%; max-width: 430px; height: 100svh; display: flex; flex-direction: column; background: var(--bg); position: relative; overflow: hidden; }

/* Header */
#header { padding: 12px 16px; border-bottom: 0.5px solid var(--border); background: var(--bg); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
#header-left { display: flex; align-items: center; gap: 10px; }
#logo-mark { width: 30px; height: 30px; flex-shrink: 0; }
#header-title { font-size: 13px; font-weight: 600; color: var(--text); }
#header-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
#comercial-select { font-size: 12px; padding: 5px 9px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); outline: none; }

/* Barra de presupuesto */
#pres-bar { padding: 8px 14px; background: var(--bg2); border-bottom: 0.5px solid var(--border); display: none; align-items: center; justify-content: space-between; gap: 10px; flex-shrink: 0; }
#pres-bar.visible { display: flex; }
#pres-info-block { flex: 1; min-width: 0; }
#pres-num { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#pres-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
#pres-actions { display: flex; gap: 6px; flex-shrink: 0; }
.pres-btn { font-size: 11px; padding: 6px 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); cursor: pointer; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
.pres-btn.primary { background: var(--navy); color: #fff; border-color: var(--navy); }
.pres-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Mensajes */
#messages { flex: 1; overflow-y: auto; padding: 14px 14px 8px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; }
.msg { max-width: 90%; display: flex; flex-direction: column; gap: 3px; }
.msg.user { align-self: flex-end; align-items: flex-end; }
.msg.assistant { align-self: flex-start; align-items: flex-start; }
.bubble { padding: 10px 13px; border-radius: 16px; font-size: 14px; line-height: 1.55; word-break: break-word; }
.user .bubble { background: var(--navy); color: #fff; border-bottom-right-radius: 4px; }
.assistant .bubble { background: var(--bg2); color: var(--text); border-bottom-left-radius: 4px; border: 0.5px solid var(--border); }
.timestamp { font-size: 10px; color: var(--text3); padding: 0 4px; }

/* Typing */
.typing-dots { display: flex; gap: 4px; padding: 12px 14px; align-items: center; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: bounce 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

/* Link card */
.link-card { margin-top: 8px; background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); overflow: hidden; }
.link-card-header { background: var(--navy); padding: 8px 12px; display: flex; align-items: center; gap: 6px; }
.link-card-header span { font-size: 11px; color: rgba(255,255,255,0.75); font-weight: 500; }
.link-card-body { padding: 10px 12px; }
.link-url { font-size: 11px; color: var(--text2); word-break: break-all; margin-bottom: 8px; font-family: monospace; }
.link-btns { display: flex; gap: 6px; }
.link-btn { flex: 1; padding: 8px 0; border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); display: flex; align-items: center; justify-content: center; gap: 5px; }
.link-btn.primary { background: var(--navy); color: #fff; border-color: var(--navy); }
.link-btn:active { transform: scale(0.97); }
.comision-note { margin-top: 8px; font-size: 12px; color: var(--text2); }
.comision-note strong { color: var(--text); }

/* Input */
#input-area { padding: 10px 14px; border-top: 0.5px solid var(--border); background: var(--bg); display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
#msg-input { flex: 1; border: 0.5px solid var(--border2); border-radius: 18px; padding: 9px 14px; font-size: 15px; font-family: inherit; resize: none; max-height: 100px; line-height: 1.4; background: var(--bg2); color: var(--text); outline: none; -webkit-appearance: none; }
#send-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--navy); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
#send-btn i { color: #fff; font-size: 17px; }

/* Modal preview */
#preview-modal { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.55); align-items: flex-end; justify-content: center; z-index: 100; }
#preview-modal.open { display: flex; }
#preview-sheet { background: var(--bg); border-radius: 20px 20px 0 0; width: 100%; max-height: 85vh; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
#preview-drag { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 14px; }
.preview-header { background: var(--navy); color: #fff; padding: 16px; border-radius: var(--radius); margin-bottom: 1px; }
.preview-tagline { font-size: 9px; letter-spacing: 0.1em; opacity: 0.6; text-transform: uppercase; margin-bottom: 4px; }
.preview-empresa { font-size: 17px; font-weight: 600; }
.preview-fecha { font-size: 11px; opacity: 0.5; margin-top: 3px; }
.preview-body { border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.preview-cliente { padding: 12px 14px; background: var(--bg2); border-bottom: 0.5px solid var(--border); }
.cli-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
.cli-nombre { font-size: 15px; font-weight: 600; color: var(--text); margin-top: 2px; }
.cli-tipo { display: inline-block; margin-top: 4px; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.t-b2c { background: #e8f5e8; color: #1a7a1a; }
.t-b2b { background: var(--navy); color: #fff; }
.p-section { padding: 6px 14px; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); background: var(--bg2); border-bottom: 0.5px solid var(--border); border-top: 0.5px solid var(--border); }
.p-item { padding: 10px 14px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.p-item:last-child { border-bottom: none; }
.p-item-left { flex: 1; min-width: 0; }
.p-marca { font-size: 9px; color: var(--text3); text-transform: uppercase; }
.p-nombre { font-size: 13px; color: var(--text); font-weight: 500; }
.p-qty { font-size: 11px; color: var(--text2); margin-top: 2px; display: flex; align-items: center; gap: 5px; }
.p-badge { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 8px; }
.bd { background: #e6f4e6; color: #1a7a1a; }
.bm { background: #e6eaf8; color: #1a3a7a; }
.bw { background: #fff3e0; color: #b06000; }
.p-item-right { text-align: right; flex-shrink: 0; }
.p-usd { font-size: 14px; font-weight: 600; color: var(--text); }
.p-ars { font-size: 10px; color: var(--text2); margin-top: 1px; }
.p-totales { padding: 12px 14px; background: var(--bg2); border-top: 0.5px solid var(--border); }
.p-total-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.p-total-main { display: flex; justify-content: space-between; align-items: center; background: var(--navy); padding: 12px 14px; border-radius: var(--radius-sm); margin-top: 8px; }
.p-total-main-label { font-size: 12px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.08em; }
.p-total-main-usd { font-size: 20px; font-weight: 700; color: #fff; }
.p-total-main-ars { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 2px; text-align: right; }
.p-venc { padding: 8px 14px; font-size: 11px; color: #8a6000; background: #fffaf0; border-top: 0.5px solid #f0e0b0; }
.p-footer { background: var(--navy); padding: 12px 14px; border-radius: var(--radius); margin-top: 1px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px 12px; }
.p-footer-item { font-size: 10px; color: rgba(255,255,255,0.5); display: flex; align-items: center; gap: 5px; }
.p-footer-item i { font-size: 12px; opacity: 0.6; }
.preview-actions { display: flex; gap: 8px; margin-top: 12px; }
.preview-btn { flex: 1; padding: 12px; border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); display: flex; align-items: center; justify-content: center; gap: 6px; }
.preview-btn.primary { background: var(--navy); color: #fff; border-color: var(--navy); }
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="header-left">
      <svg id="logo-mark" viewBox="0 0 80 80" fill="none">
        <polygon points="4,4 34,4 34,34 4,34" fill="#0d1b3e" opacity="0.95"/>
        <polygon points="34,4 76,4 76,46 34,46" fill="#1a2f6e" opacity="0.7"/>
        <polygon points="4,34 34,34 34,76 4,76" fill="#1a2f6e" opacity="0.7"/>
        <polygon points="34,46 76,46 76,76 34,76" fill="#2a4a9e" opacity="0.45"/>
        <polygon points="18,18 40,18 40,40 18,40" fill="#fff" opacity="0.12"/>
      </svg>
      <div>
        <div id="header-title">Nova Domus Comercial</div>
        <div id="header-sub">Presupuestos inteligentes</div>
      </div>
    </div>
    <select id="comercial-select">
      <option value="">Mi nombre...</option>
      <option value="Agustín">Agustín</option>
      <option value="Maxi">Maxi</option>
      <option value="Lucas">Lucas</option>
      <option value="Mili">Mili</option>
    </select>
  </div>

  <div id="pres-bar">
    <div id="pres-info-block">
      <div id="pres-num">Presupuesto en curso</div>
      <div id="pres-sub">—</div>
    </div>
    <div id="pres-actions">
      <button class="pres-btn" onclick="verPreview()"><i class="ti ti-eye"></i> Ver</button>
      <button class="pres-btn primary" id="btn-guardar" onclick="guardarPresupuesto()"><i class="ti ti-device-floppy"></i> Guardar</button>
    </div>
  </div>

  <div id="messages">
    <div class="msg assistant">
      <div class="bubble">¡Hola! Soy tu asistente comercial Nova Domus 👋<br><br>Seleccioná tu nombre arriba y contame qué presupuesto querés armar — cliente, tipo (B2C o B2B) y productos.</div>
      <div class="timestamp">ahora</div>
    </div>
  </div>

  <div id="input-area">
    <textarea id="msg-input" placeholder="Escribí acá..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()" aria-label="Enviar"><i class="ti ti-send"></i></button>
  </div>

  <div id="preview-modal">
    <div id="preview-sheet">
      <div id="preview-drag"></div>
      <div id="preview-content"></div>
      <div class="preview-actions">
        <button class="preview-btn" onclick="closePreview()"><i class="ti ti-x"></i> Cerrar</button>
        <button class="preview-btn primary" id="btn-abrir-link" onclick="abrirLinkPreview()" style="display:none"><i class="ti ti-external-link"></i> Abrir link</button>
      </div>
    </div>
  </div>

</div>

<script>
const SB_URL = 'https://vvwnyszcfindtuvojqgs.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2d255c3pjZmluZHR1dm9qcWdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NzQ0OTYsImV4cCI6MjA5NzA1MDQ5Nn0.m88xRQjifgPayIBY8Y98fP4jQ1AzyrBJidZDyTamWxE';
const PAGES_BASE = 'https://novadomuscba.github.io/presupuestos/';

let history = [];
let presActual = null;
let presGuardado = null;
let comercial = '';

const SYSTEM = `Sos el asistente comercial de Nova Domus, empresa de domótica e integración tecnológica en Córdoba, Argentina.

REGLAS DE PRECIOS:
- Costo con IVA = precio_sin_iva × (1 + iva)
- Precio sugerido = precio_sin_iva × (1 + remarque)
- B2C: precio final = precio_sugerido × 0.95 (siempre funciona)
- B2B: objetivo = precio_sugerido × 0.75, PERO:
  * Margen = (precio_final - costo_con_iva) / costo_con_iva
  * Si margen < 20%: ajustar precio para que margen = exactamente 20%
  * Si con 0% descuento margen < 20%: alerta IMPOSIBLE_B2B, usar precio B2C
  * Margen máximo: 30%
- Comisión = 30% del margen bruto en USD (SOLO dispositivos, NUNCA MO)
- MO con Factura A: agregar IVA 21%. Sin Factura A: sin IVA
- TC: Dólar BNA Oficial

FLUJO: pedir datos cliente → buscar productos → confirmar opciones → calcular → mostrar resumen CON comisión (comisión NUNCA va en el doc del cliente) → confirmar → generar JSON.

Respondé en español rioplatense informal. Sé conciso, estamos en mobile.

BUSCAR PRODUCTO → respondé SOLO:
{"action":"search","q":"término"}

PRESUPUESTO CONFIRMADO → respondé SOLO:
{"action":"listo","data":{"cliente_nombre":"","cliente_empresa":null,"cliente_email":null,"cliente_telefono":null,"cliente_tipo":"B2C","cliente_requiere_factura_a":false,"tc_bna_oficial":1453,"items":[{"tipo_linea":"DISPOSITIVO","inventario_id":null,"marca":"","nombre":"","sku":null,"cantidad":1,"precio_costo_sin_iva_usd":0,"iva_rate":0.21,"precio_costo_con_iva_usd":0,"precio_sugerido_usd":0,"descuento_aplicado":0.05,"precio_final_unitario_usd":0,"subtotal_usd":0,"margen_porcentaje":0,"alerta_b2b_imposible":false,"tipo_dolar":"USD OFICIAL"}],"subtotal_dispositivos_usd":0,"subtotal_mo_usd":0,"total_usd":0,"total_ars":0,"margen_dispositivos_usd":0,"comision_comercial_usd":0,"notas":""}}`;

async function sb(path, opts={}) {
  const r = await fetch(SB_URL+path, { ...opts, headers: { 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY, 'Content-Type':'application/json', ...(opts.headers||{}) }});
  return r.json();
}

async function buscarInventario(q) {
  const terms = q.toLowerCase().split(' ').filter(t=>t.length>2);
  const cond = terms.map(t=>`nombre.ilike.%${t}%,marca.ilike.%${t}%,grupo.ilike.%${t}%`).join(',');
  const data = await sb(`/rest/v1/inventario?or=(${cond})&select=id,marca,nombre,sku,precio_sin_iva,iva,remarque&limit=8`);
  return Array.isArray(data) ? data : [];
}

async function getComercialId(nombre) {
  const d = await sb(`/rest/v1/comerciales?nombre=eq.${encodeURIComponent(nombre)}&select=id`);
  return d?.[0]?.id || null;
}

async function guardarEnSb(d, cid) {
  const numR = await sb('/rest/v1/rpc/generar_numero_presupuesto', { method:'POST', body:'{}' });
  const numero = typeof numR==='string' ? numR.replace(/"/g,'') : 'PC-2026-001';
  const cab = { numero, comercial_id:cid, cliente_nombre:d.cliente_nombre, cliente_empresa:d.cliente_empresa||null, cliente_email:d.cliente_email||null, cliente_telefono:d.cliente_telefono||null, cliente_tipo:d.cliente_tipo, cliente_requiere_factura_a:d.cliente_requiere_factura_a, tc_bna_oficial:d.tc_bna_oficial, subtotal_dispositivos_usd:d.subtotal_dispositivos_usd, subtotal_mo_usd:d.subtotal_mo_usd, total_usd:d.total_usd, total_ars:d.total_ars, margen_dispositivos_usd:d.margen_dispositivos_usd, comision_comercial_usd:d.comision_comercial_usd, estado:'BORRADOR', notas:d.notas||null };
  const presR = await sb('/rest/v1/presupuestos_comerciales?select=id', { method:'POST', headers:{'Prefer':'return=representation'}, body:JSON.stringify(cab) });
  const presId = presR?.[0]?.id;
  if (!presId) throw new Error('Sin ID');
  await sb('/rest/v1/presupuestos_items', { method:'POST', body:JSON.stringify(d.items.map(it=>({...it, presupuesto_id:presId}))) });
  return { id:presId, numero };
}

function now() { return new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}); }

function addMsg(role, content) {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg '+role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (typeof content === 'string') bubble.innerHTML = content.replace(/\n/g,'<br>');
  else bubble.appendChild(content);
  const ts = document.createElement('div');
  ts.className = 'timestamp'; ts.textContent = now();
  div.appendChild(bubble); div.appendChild(ts);
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function typing(show) {
  const existing = document.getElementById('typing-el');
  if (!show) { if(existing) existing.remove(); return; }
  if (existing) return;
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg assistant'; div.id = 'typing-el';
  div.innerHTML = '<div class="bubble"><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function buildLinkCard(id, numero, comision) {
  const url = PAGES_BASE + '?id=' + id;
  const el = document.createElement('div');
  el.innerHTML = `
    <div style="font-size:14px;line-height:1.5;margin-bottom:8px;">
      ✅ <strong>${numero}</strong> guardado en el sistema.<br>
      Compartí este link con el cliente para que vea el presupuesto y descargue la imagen:
    </div>
    <div class="link-card">
      <div class="link-card-header">
        <i class="ti ti-file-description" style="font-size:13px;color:rgba(255,255,255,0.6)"></i>
        <span>Presupuesto Nova Domus · ${numero}</span>
      </div>
      <div class="link-card-body">
        <div class="link-url">${url}</div>
        <div class="link-btns">
          <button class="link-btn" onclick="copyToClip('${url}', this)"><i class="ti ti-copy" style="font-size:13px"></i> Copiar</button>
          <button class="link-btn primary" onclick="openLink('${url}')"><i class="ti ti-external-link" style="font-size:13px"></i> Abrir</button>
        </div>
      </div>
    </div>
    <div class="comision-note">💰 Tu comisión estimada: <strong>USD ${Number(comision).toFixed(2)}</strong></div>`;
  return el;
}

function copyToClip(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    btn.innerHTML = '<i class="ti ti-check" style="font-size:13px"></i> Copiado!';
    setTimeout(() => { btn.innerHTML = '<i class="ti ti-copy" style="font-size:13px"></i> Copiar'; }, 2500);
  });
}

async function claude(userMsg) {
  history.push({ role:'user', content:userMsg });
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:1000, system:SYSTEM, messages:history })
  });
  const d = await r.json();
  const text = d.content?.[0]?.text || '';
  history.push({ role:'assistant', content:text });
  return text;
}

async function handleResponse(text) {
  let parsed = null;
  try { parsed = JSON.parse(text.trim()); } catch(e) {}

  if (parsed?.action === 'search') {
    typing(true);
    const results = await buscarInventario(parsed.q);
    typing(false);
    if (!results.length) {
      const f = await claude('[SISTEMA] Sin resultados para: '+parsed.q+'. Informá y pedí reformulación.');
      addMsg('assistant', f); return;
    }
    let msg = '[SISTEMA] Resultados inventario:\n';
    results.forEach((p,i) => {
      const cc = p.precio_sin_iva*(1+p.iva);
      const sg = p.precio_sin_iva*(1+p.remarque);
      msg += `${i+1}. ID:${p.id} | ${p.marca} ${p.nombre} (${p.sku||'—'}) | Costo c/IVA: USD${cc.toFixed(2)} | Sugerido: USD${sg.toFixed(2)} | Remarque:${(p.remarque*100).toFixed(0)}%\n`;
    });
    msg += '\nMostrá opciones y pedí que el usuario elija.';
    typing(true);
    const f = await claude(msg);
    typing(false);
    addMsg('assistant', f);

  } else if (parsed?.action === 'listo') {
    presActual = parsed.data;
    document.getElementById('pres-bar').classList.add('visible');
    document.getElementById('pres-num').textContent = 'Listo para guardar';
    document.getElementById('pres-sub').textContent = `${parsed.data.cliente_nombre} · ${parsed.data.cliente_tipo} · USD ${Number(parsed.data.total_usd).toFixed(0)}`;
    addMsg('assistant', `Presupuesto armado ✓\n\nTocá <strong>Guardar</strong> arriba para generar el link del cliente.`);
  } else {
    addMsg('assistant', text);
  }
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  comercial = document.getElementById('comercial-select').value;
  if (!comercial) { addMsg('assistant', 'Primero seleccioná tu nombre arriba 👆'); return; }
  input.value = ''; input.style.height = '';
  addMsg('user', text);
  typing(true);
  try {
    const resp = await claude(text);
    typing(false);
    await handleResponse(resp);
  } catch(e) {
    typing(false);
    addMsg('assistant', 'Error de conexión. Intentá de nuevo.');
  }
}

async function guardarPresupuesto() {
  if (!presActual) return;
  const btn = document.getElementById('btn-guardar');
  btn.innerHTML = '<i class="ti ti-loader"></i> Guardando...';
  btn.disabled = true;
  try {
    const cid = await getComercialId(comercial);
    const { id, numero } = await guardarEnSb(presActual, cid);
    presGuardado = { id, numero };
    document.getElementById('pres-num').textContent = numero;
    document.getElementById('pres-sub').textContent = 'Guardado · BORRADOR';
    btn.innerHTML = '<i class="ti ti-check"></i> Guardado';
    addMsg('assistant', buildLinkCard(id, numero, presActual.comision_comercial_usd));
  } catch(e) {
    btn.innerHTML = '<i class="ti ti-device-floppy"></i> Guardar';
    btn.disabled = false;
    addMsg('assistant', 'Error al guardar. Intentá de nuevo.');
  }
}

function handleKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height=''; el.style.height=Math.min(el.scrollHeight,100)+'px'; }

function verPreview() {
  if (!presActual) return;
  const d = presActual;
  const tc = d.tc_bna_oficial||1453;
  const hoy = new Date();
  const vence = new Date(hoy); vence.setDate(vence.getDate()+30);
  const fmt = dt => dt.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'});
  const esB2B = d.cliente_tipo==='B2B';
  const fUSD = n => 'USD '+Number(n).toLocaleString('es-AR',{maximumFractionDigits:0});
  const fARS = n => '$ '+Number(n*tc).toLocaleString('es-AR',{maximumFractionDigits:0});

  const disp = d.items.filter(i=>i.tipo_linea==='DISPOSITIVO');
  const serv = d.items.filter(i=>i.tipo_linea==='SERVICIO');

  function buildItems(arr, label) {
    if (!arr.length) return '';
    let h = `<div class="p-section">${label}</div>`;
    arr.forEach(it => {
      const desc = (it.descuento_aplicado*100).toFixed(0);
      const marg = it.margen_porcentaje ? (it.margen_porcentaje*100).toFixed(0) : null;
      let badge = '';
      if (it.alerta_b2b_imposible) badge = `<span class="p-badge bw">precio mínimo</span>`;
      else if (esB2B && marg && it.tipo_linea==='DISPOSITIVO') badge = `<span class="p-badge bm">${marg}% margen</span>`;
      else if (it.tipo_linea==='DISPOSITIVO') badge = `<span class="p-badge bd">${desc}% OFF</span>`;
      h += `<div class="p-item">
        <div class="p-item-left"><div class="p-marca">${it.marca}</div><div class="p-nombre">${it.nombre}</div><div class="p-qty">x${it.cantidad} ${badge}</div></div>
        <div class="p-item-right"><div class="p-usd">${fUSD(it.subtotal_usd)}</div><div class="p-ars">${fARS(it.subtotal_usd)}</div></div>
      </div>`;
    });
    return h;
  }

  const showLink = !!presGuardado;
  document.getElementById('btn-abrir-link').style.display = showLink ? 'flex' : 'none';

  document.getElementById('preview-content').innerHTML = `
    <div class="preview-header">
      <div class="preview-tagline">Habitamos espacios inteligentes</div>
      <div class="preview-empresa">Nova Domus</div>
      <div class="preview-fecha">Cotización · ${fmt(hoy)}</div>
    </div>
    <div class="preview-body" style="margin-top:8px">
      <div class="preview-cliente">
        <div class="cli-label">Preparado para</div>
        <div class="cli-nombre">${d.cliente_nombre}${d.cliente_empresa?' · '+d.cliente_empresa:''}</div>
        <span class="cli-tipo ${esB2B?'t-b2b':'t-b2c'}">${d.cliente_tipo}</span>
      </div>
      ${buildItems(disp,'Dispositivos')}${buildItems(serv,'Servicios')}
      <div class="p-totales">
        ${d.subtotal_dispositivos_usd>0?`<div class="p-total-row"><span>Dispositivos</span><span>${fUSD(d.subtotal_dispositivos_usd)}</span></div>`:''}
        ${d.subtotal_mo_usd>0?`<div class="p-total-row"><span>Servicios</span><span>${fUSD(d.subtotal_mo_usd)}</span></div>`:''}
        <div class="p-total-main">
          <span class="p-total-main-label">Total</span>
          <div><div class="p-total-main-usd">${fUSD(d.total_usd)}</div><div class="p-total-main-ars">${fARS(d.total_usd)}</div></div>
        </div>
        <div style="font-size:10px;color:var(--text3);text-align:center;margin-top:6px">TC BNA $ ${Number(tc).toLocaleString('es-AR')} · ${fmt(hoy)}</div>
      </div>
      <div class="p-venc">⏱ Válido hasta el ${fmt(vence)}</div>
    </div>
    <div class="p-footer" style="margin-top:8px">
      <div class="p-footer-item"><i class="ti ti-phone"></i>3516-747513</div>
      <div class="p-footer-item"><i class="ti ti-mail"></i>admin@nova-domus.com.ar</div>
      <div class="p-footer-item"><i class="ti ti-world"></i>nova-domus.com.ar</div>
      <div class="p-footer-item"><i class="ti ti-brand-instagram"></i>nova_domus_domotica</div>
    </div>`;

  document.getElementById('preview-modal').classList.add('open');
}

function closePreview() { document.getElementById('preview-modal').classList.remove('open'); }
function abrirLinkPreview() { if(presGuardado) openLink(PAGES_BASE+'?id='+presGuardado.id); closePreview(); }
</script>
